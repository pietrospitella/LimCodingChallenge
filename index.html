<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
<link rel="stylesheet" href="style.css">
    <meta charset="utf-8">
    <title>Lim</title>
    <link rel="preconnect" href="https://fonts.gstatic.com">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500&display=swap" rel="stylesheet">
  </head>
  <body>

  <div class="container">
    <header class="logo-and-sub">
      <!-- Header -->
      <img class="logo" src="logo.png" alt="">
      <h2 class="sub">Taking Booleaners from A to B</h2>
    </header>

    <nav>
      <!-- bar -->
      <div class="greenbar">
        <button type="button" name="book">Prenota</button>
        <button type="button" name="stop booking">Termina Prenotazione</button>
        <button type="button" name="lights on">Accendi luci</button>
      </div>
    </nav>

    <main>
      <!-- status -->
      <section>
        <input type="checkbox" name="select1" value="">
        <span class="scooter-name"><strong>Monopattino Gino22</strong></span>
        <p class="description">--> Via Guadalametri - A 220 metri da te</p>
        <p>Stato carica:</p>
        <div class="statusbar-orange"></div>
      </section>

      <section>
        <input type="checkbox" name="select1" value="">
        <span class="scooter-name"><strong>Monopattino Mike24</strong></span>
        <p class="description">--> Via Ricciardoni - A 420 metri da te</p>
        <p>Stato carica:</p>
        <div class="statusbar-green"></div>
      </section>

      <section>
        <input type="checkbox" name="select1" value="">
        <span class="scooter-name"><strong>Monopattino Fede154</strong></span>
        <p class="description">--> Via Mentarini - A 490 metri da te</p>
        <p>Stato carica:</p>
        <div class="statusbar-red"></div>
      </section>

    </main>

    <footer>
      <!-- footer -->

    </footer>
  </div>
  </body>
</html>
